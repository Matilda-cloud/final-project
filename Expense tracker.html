<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To do App</title>
</head>

<style>
    /* ── Reset & Variables ─────────────────────────────── */
    *,
    *::before,
    *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
    }

    :root {
        --bg: #0d0f12;
        --surface: #161920;
        --surface2: #1e2229;
        --border: #2a2f3a;
        --accent: #c8f05e;
        --accent2: #f05e7a;
        --income: #5ef0a0;
        --expense: #f05e7a;
        --text: #e8eaf0;
        --muted: #5a6070;
        --card-r: 12px;
        --mono: 'DM Mono', monospace;
        --display: 'Syne', sans-serif;
    }

    html {
        font-size: 16px;
    }

    body {
        background: var(--bg);
        color: var(--text);
        font-family: var(--mono);
        min-height: 100vh;
        line-height: 1.6;
    }

    /* ── Layout ────────────────────────────────────────── */
    .wrapper {
        max-width: 860px;
        margin: 0 auto;
        padding: 2.5rem 1.5rem 4rem;
    }

    /* ── Header ────────────────────────────────────────── */
    header {
        display: flex;
        align-items: flex-end;
        justify-content: space-between;
        margin-bottom: 2.5rem;
        padding-bottom: 1.25rem;
        border-bottom: 1px solid var(--border);
        animation: fadeUp 0.4s ease both;
    }

    header h1 {
        font-family: var(--display);
        font-size: 2rem;
        font-weight: 800;
        letter-spacing: -0.02em;
        line-height: 1;
    }

    header h1 span {
        color: var(--accent);
    }

    .header-date {
        font-size: 0.75rem;
        color: var(--muted);
        text-align: right;
    }

    /* ── Summary Cards ─────────────────────────────────── */
    .summary {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 1rem;
        margin-bottom: 2rem;
        animation: fadeUp 0.4s 0.05s ease both;
    }

    .card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--card-r);
        padding: 1.25rem 1.5rem;
        position: relative;
        overflow: hidden;
    }

    .card::after {
        content: '';
        position: absolute;
        bottom: 0;
        left: 0;
        right: 0;
        height: 2px;
    }

    .card.balance::after {
        background: var(--accent);
    }

    .card.income-c::after {
        background: var(--income);
    }

    .card.expense-c::after {
        background: var(--expense);
    }

    .card-label {
        font-size: 0.7rem;
        text-transform: uppercase;
        letter-spacing: 0.12em;
        color: var(--muted);
        margin-bottom: 0.5rem;
    }

    .card-value {
        font-family: var(--display);
        font-size: 1.6rem;
        font-weight: 800;
        letter-spacing: -0.02em;
        line-height: 1;
    }

    .card.balance .card-value {
        color: var(--accent);
    }

    .card.income-c .card-value {
        color: var(--income);
    }

    .card.expense-c .card-value {
        color: var(--expense);
    }

    .card-sub {
        font-size: 0.7rem;
        color: var(--muted);
        margin-top: 0.35rem;
    }

    /* ── Main Grid ─────────────────────────────────────── */
    .main-grid {
        display: grid;
        grid-template-columns: 1fr 1.4fr;
        gap: 1.25rem;
        align-items: start;
    }

    /* ── Form Panel ────────────────────────────────────── */
    .panel {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--card-r);
        padding: 1.5rem;
        animation: fadeUp 0.4s 0.1s ease both;
    }

    .panel-title {
        font-family: var(--display);
        font-size: 0.85rem;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: var(--muted);
        margin-bottom: 1.25rem;
    }

    /* Type Toggle */
    .type-toggle {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 6px;
        margin-bottom: 1rem;
    }

    .type-btn {
        padding: 0.6rem;
        border-radius: 8px;
        border: 1px solid var(--border);
        background: transparent;
        color: var(--muted);
        font-family: var(--mono);
        font-size: 0.78rem;
        cursor: pointer;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        transition: all 0.18s;
    }

    .type-btn:hover {
        border-color: var(--accent);
        color: var(--text);
    }

    .type-btn.active-expense {
        background: rgba(240, 94, 122, 0.12);
        border-color: var(--expense);
        color: var(--expense);
    }

    .type-btn.active-income {
        background: rgba(94, 240, 160, 0.12);
        border-color: var(--income);
        color: var(--income);
    }

    /* Fields */
    .field {
        margin-bottom: 0.9rem;
    }

    .field label {
        display: block;
        font-size: 0.68rem;
        text-transform: uppercase;
        letter-spacing: 0.1em;
        color: var(--muted);
        margin-bottom: 0.35rem;
    }

    .field input,
    .field select {
        width: 100%;
        background: var(--surface2);
        border: 1px solid var(--border);
        border-radius: 8px;
        color: var(--text);
        font-family: var(--mono);
        font-size: 0.85rem;
        padding: 0.6rem 0.85rem;
        outline: none;
        transition: border-color 0.18s;
        appearance: none;
    }

    .field input:focus,
    .field select:focus {
        border-color: var(--accent);
    }

    .field input::placeholder {
        color: var(--muted);
    }

    .field select option {
        background: var(--surface2);
    }

    /* Submit Button */
    .submit-btn {
        width: 100%;
        padding: 0.75rem;
        margin-top: 0.25rem;
        border-radius: 8px;
        border: none;
        background: var(--accent);
        color: #0d0f12;
        font-family: var(--display);
        font-size: 0.85rem;
        font-weight: 800;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        cursor: pointer;
        transition: all 0.18s;
    }

    .submit-btn:hover {
        background: #d8ff6e;
        transform: translateY(-1px);
    }

    .submit-btn:active {
        transform: translateY(0);
    }

    /* Error message */
    .error-msg {
        font-size: 0.72rem;
        color: var(--expense);
        margin-top: 0.5rem;
        min-height: 1em;
        transition: opacity 0.2s;
    }

    /* ── Transaction List ──────────────────────────────── */
    .list-panel {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--card-r);
        overflow: hidden;
        animation: fadeUp 0.4s 0.15s ease both;
    }

    .list-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 1.25rem 1.5rem 1rem;
        border-bottom: 1px solid var(--border);
    }

    .list-title {
        font-family: var(--display);
        font-size: 0.85rem;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: var(--muted);
    }

    .list-controls {
        display: flex;
        gap: 8px;
    }

    .ctrl-select {
        background: var(--surface2);
        border: 1px solid var(--border);
        border-radius: 6px;
        color: var(--muted);
        font-family: var(--mono);
        font-size: 0.7rem;
        padding: 0.3rem 0.6rem;
        outline: none;
        cursor: pointer;
        transition: border-color 0.15s;
    }

    .ctrl-select:focus {
        border-color: var(--accent);
    }

    .txn-list {
        list-style: none;
        max-height: 460px;
        overflow-y: auto;
    }

    .txn-list::-webkit-scrollbar {
        width: 4px;
    }

    .txn-list::-webkit-scrollbar-track {
        background: transparent;
    }

    .txn-list::-webkit-scrollbar-thumb {
        background: var(--border);
        border-radius: 4px;
    }

    .txn-item {
        display: flex;
        align-items: center;
        gap: 0.85rem;
        padding: 0.9rem 1.5rem;
        border-bottom: 1px solid var(--border);
        transition: background 0.15s;
        animation: slideIn 0.25s ease both;
    }

    .txn-item:last-child {
        border-bottom: none;
    }

    .txn-item:hover {
        background: var(--surface2);
    }

    .txn-dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        flex-shrink: 0;
    }

    .txn-dot.income {
        background: var(--income);
        box-shadow: 0 0 6px var(--income);
    }

    .txn-dot.expense {
        background: var(--expense);
        box-shadow: 0 0 6px var(--expense);
    }

    .txn-info {
        flex: 1;
        min-width: 0;
    }

    .txn-desc {
        font-size: 0.88rem;
        font-weight: 500;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
    }

    .txn-meta {
        font-size: 0.68rem;
        color: var(--muted);
        margin-top: 2px;
    }

    .txn-cat {
        display: inline-block;
        font-size: 0.62rem;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        padding: 2px 7px;
        border-radius: 20px;
        border: 1px solid var(--border);
        color: var(--muted);
        margin-left: 5px;
    }

    .txn-amount {
        font-family: var(--display);
        font-size: 0.95rem;
        font-weight: 800;
        letter-spacing: -0.01em;
        white-space: nowrap;
    }

    .txn-amount.income {
        color: var(--income);
    }

    .txn-amount.expense {
        color: var(--expense);
    }

    .del-btn {
        background: none;
        border: none;
        color: var(--muted);
        cursor: pointer;
        font-size: 1rem;
        line-height: 1;
        padding: 2px 4px;
        border-radius: 4px;
        transition: color 0.15s, background 0.15s;
        flex-shrink: 0;
    }

    .del-btn:hover {
        color: var(--expense);
        background: rgba(240, 94, 122, 0.1);
    }

    /* Empty state */
    .empty-state {
        padding: 3rem 1.5rem;
        text-align: center;
        color: var(--muted);
        font-size: 0.8rem;
    }

    .empty-state-icon {
        font-size: 2rem;
        margin-bottom: 0.5rem;
        opacity: 0.3;
    }

    /* ── Chart Section ─────────────────────────────────── */
    .chart-section {
        margin-top: 1.25rem;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--card-r);
        padding: 1.5rem;
        animation: fadeUp 0.4s 0.2s ease both;
    }

    .chart-title {
        font-family: var(--display);
        font-size: 0.85rem;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: var(--muted);
        margin-bottom: 1rem;
    }

    .bar-row {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 0.65rem;
        font-size: 0.72rem;
    }

    .bar-label {
        width: 90px;
        text-align: right;
        color: var(--muted);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
    }

    .bar-track {
        flex: 1;
        height: 6px;
        background: var(--surface2);
        border-radius: 3px;
        overflow: hidden;
    }

    .bar-fill {
        height: 100%;
        border-radius: 3px;
        background: var(--expense);
        transition: width 0.4s cubic-bezier(.4, 0, .2, 1);
    }

    .bar-fill.income {
        background: var(--income);
    }

    .bar-val {
        width: 70px;
        font-size: 0.7rem;
        color: var(--muted);
        text-align: right;
    }

    /* ── Clear All Button ──────────────────────────────── */
    .clear-btn {
        display: block;
        margin: 1.25rem auto 0;
        background: none;
        border: 1px solid var(--border);
        border-radius: 8px;
        color: var(--muted);
        font-family: var(--mono);
        font-size: 0.72rem;
        padding: 0.45rem 1.2rem;
        cursor: pointer;
        transition: all 0.18s;
        text-transform: uppercase;
        letter-spacing: 0.08em;
    }

    .clear-btn:hover {
        border-color: var(--expense);
        color: var(--expense);
    }

    /* ── Animations ────────────────────────────────────── */
    @keyframes fadeUp {
        from {
            opacity: 0;
            transform: translateY(12px);
        }

        to {
            opacity: 1;
            transform: translateY(0);
        }
    }

    @keyframes slideIn {
        from {
            opacity: 0;
            transform: translateX(-8px);
        }

        to {
            opacity: 1;
            transform: translateX(0);
        }
    }

    @keyframes shake {

        0%,
        100% {
            transform: translateX(0);
        }

        20%,
        60% {
            transform: translateX(-5px);
        }

        40%,
        80% {
            transform: translateX(5px);
        }
    }

    .shake {
        animation: shake 0.3s ease;
    }

    /* ── Responsive ────────────────────────────────────── */
    @media (max-width: 640px) {
        .summary {
            grid-template-columns: 1fr;
        }

        .main-grid {
            grid-template-columns: 1fr;
        }

        .card-value {
            font-size: 1.3rem;
        }
    }
</style>
</head>

<body>

    <div class="wrapper">

        <!-- Header -->
        <header>
            <h1>Expense<span>.</span>Tracker</h1>
            <div class="header-date" id="header-date"></div>
        </header>

        <!-- Summary Cards -->
        <div class="summary">
            <div class="card balance">
                <div class="card-label">Net Balance</div>
                <div class="card-value" id="sum-balance">₦0.00</div>
                <div class="card-sub" id="sum-balance-sub">All time</div>
            </div>
            <div class="card income-c">
                <div class="card-label">Total Income</div>
                <div class="card-value" id="sum-income">₦0.00</div>
                <div class="card-sub" id="sum-income-count">0 transactions</div>
            </div>
            <div class="card expense-c">
                <div class="card-label">Total Expenses</div>
                <div class="card-value" id="sum-expense">₦0.00</div>
                <div class="card-sub" id="sum-expense-count">0 transactions</div>
            </div>
        </div>

        <!-- Main Grid: Form + List -->
        <div class="main-grid">

            <!-- Form Panel -->
            <div class="panel">
                <div class="panel-title">Add Transaction</div>

                <!-- Type Toggle -->
                <div class="type-toggle">
                    <button class="type-btn active-expense" id="btn-expense" onclick="App.setType('expense')">−
                        Expense</button>
                    <button class="type-btn" id="btn-income" onclick="App.setType('income')">+
                        Income</button>
                </div>

                <!-- Description -->
                <div class="field">
                    <label for="f-desc">Description</label>
                    <input id="f-desc" type="text" placeholder="e.g. Monthly rent" maxlength="50" autocomplete="off" />
                </div>

                <!-- Amount -->
                <div class="field">
                    <label for="f-amount">Amount (₦)</label>
                    <input id="f-amount" type="number" placeholder="0.00" min="0.01" step="0.01" />
                </div>

                <!-- Category -->
                <div class="field">
                    <label for="f-cat">Category</label>
                    <select id="f-cat"></select>
                </div>

                <!-- Date -->
                <div class="field">
                    <label for="f-date">Date</label>
                    <input id="f-date" type="date" />
                </div>

                <!-- Error -->
                <div class="error-msg" id="err-msg"></div>

                <!-- Submit -->
                <button class="submit-btn" onclick="App.add()">Add Transaction</button>
            </div>

            <!-- Transaction List Panel -->
            <div class="list-panel">
                <div class="list-header">
                    <span class="list-title" id="list-title">Transactions</span>
                    <div class="list-controls">
                        <select class="ctrl-select" id="filter-cat" onchange="App.render()">
                            <option value="">All categories</option>
                        </select>
                        <select class="ctrl-select" id="filter-type" onchange="App.render()">
                            <option value="">All types</option>
                            <option value="expense">Expense</option>
                            <option value="income">Income</option>
                        </select>
                        <select class="ctrl-select" id="sort-by" onchange="App.render()">
                            <option value="date-desc">Newest</option>
                            <option value="date-asc">Oldest</option>
                            <option value="amount-desc">Highest ₦</option>
                            <option value="amount-asc">Lowest ₦</option>
                        </select>
                    </div>
                </div>
                <ul class="txn-list" id="txn-list"></ul>
            </div>

        </div>

        <!-- Chart Section -->
        <div class="chart-section">
            <div class="chart-title">Expense Breakdown by Category</div>
            <div id="chart-bars"></div>
        </div>

        <!-- Clear All -->
        <button class="clear-btn" onclick="App.clearAll()">Clear All Transactions</button>

    </div>


    <script>
        const STORAGE_KEY = 'xpense-tracker-v3';

        const CATEGORIES = {
            expense: ['Food', 'Transport', 'Shopping', 'Bills', 'Health', 'Other'],
            income: ['Salary', 'Business', 'Gift', 'Other']
        };

        const $ = id => document.getElementById(id);

        const formatMoney = n =>
            '₦' + Math.abs(n).toLocaleString('en-NG', {
                minimumFractionDigits: 2,
                maximumFractionDigits: 2
            });

        const today = () => new Date().toISOString().slice(0, 10);

        const Store = {
            load() {
                try {
                    return JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
                } catch {
                    return [];
                }
            },
            save(data) {
                localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
            }
        };

        const App = (() => {
            let transactions = Store.load();
            let type = "expense";

            function init() {
                $("f-date").value = today();
                setCategoryOptions();
                render();
            }

            function setType(t) {
                type = t;
                $("btn-expense").classList.toggle("active-expense", t === "expense");
                $("btn-income").classList.toggle("active-income", t === "income");
                setCategoryOptions();
            }

            function setCategoryOptions() {
                $("f-cat").innerHTML = CATEGORIES[type]
                    .map(c => `<option>${c}</option>`)
                    .join("");
            }

            function add() {
                const desc = $("f-desc").value.trim();
                const amount = parseFloat($("f-amount").value);
                const cat = $("f-cat").value;
                const date = $("f-date").value;

                if (!desc || !amount || amount <= 0) {
                    showError("Enter valid description and amount");
                    return;
                }

                const tx = {
                    id: Date.now(),
                    type,
                    desc,
                    amount,
                    cat,
                    date
                };

                transactions.unshift(tx);
                Store.save(transactions);

                resetForm();
                render();
            }

            function remove(id) {
                transactions = transactions.filter(t => t.id !== id);
                Store.save(transactions);
                render();
            }

            function resetForm() {
                $("f-desc").value = "";
                $("f-amount").value = "";
                $("f-date").value = today();
                clearError();
            }

            function renderSummary() {
                const income = transactions
                    .filter(t => t.type === "income")
                    .reduce((a, t) => a + t.amount, 0);

                const expense = transactions
                    .filter(t => t.type === "expense")
                    .reduce((a, t) => a + t.amount, 0);

                const balance = income - expense;

                $("sum-income").textContent = formatMoney(income);
                $("sum-expense").textContent = formatMoney(expense);
                $("sum-balance").textContent =
                    (balance < 0 ? "-" : "") + formatMoney(balance);
            }

            function renderList() {
                const list = $("txn-list");

                if (!transactions.length) {
                    list.innerHTML = "<li>No transactions yet</li>";
                    return;
                }

                list.innerHTML = transactions
                    .map(t => `
        <li class="txn-item">
          <div class="txn-dot ${t.type}"></div>
          <div class="txn-info">
            <div>${t.desc}</div>
            <small>${t.cat}</small>
          </div>
          <span class="${t.type}">
            ${t.type === "expense" ? "-" : "+"}${formatMoney(t.amount)}
          </span>
          <button onclick="App.remove(${t.id})">x</button>
        </li>
      `)
                    .join("");
            }

            function render() {
                renderSummary();
                renderList();
            }

            function showError(msg) {
                $("err-msg").textContent = msg;
            }

            function clearError() {
                $("err-msg").textContent = "";
            }

            return {
                init,
                setType,
                add,
                remove
            };
        })();

        document.addEventListener("DOMContentLoaded", App.init);
    </script>


</body>

</html>
