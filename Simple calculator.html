<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Simple Calculator</title>

    <style>
        body {
            font-family: Arial;
            background: rgb(129, 155, 129);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .calculator {
            background: linear-gradient(rgb(85, 159, 85), rgb(74, 121, 74));
            padding: 20px;
            border-radius: 15px;
            width: 300px;
            height: 350px;
        }

        .display {
            background: linear-gradient(green, rgb(124, 189, 124));
            color: #000000;
            font-size: 28px;
            padding: 15px;
            border-radius: 10px;
            text-align: right;
            margin-bottom: 10px;
        }

        .buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
        }

        button {
            padding: 14px;
            border: none;
            border-radius: 18px;
            background: rgb(112, 172, 112);
            color: white;
            font-size: 16px;
            cursor: pointer;
        }

        /* button:hover {
            background: #475569;
        } */

        .operator {
            background: rgb(66, 137, 66);
        }

        /* .equal {
            background: pink;
        } */

        .clear {
            background: rgb(65, 183, 65);
        }
    </style>
</head>

<body>

    <div class="calculator">
        <div class="display" id="display">0</div>

        <div class="buttons" id="buttons">
            <button class="clear">C</button>
            <button class="operator">/</button>
            <button class="operator">*</button>
            <button class="operator">-</button>

            <button>7</button>
            <button>8</button>
            <button>9</button>
            <button class="operator">+</button>

            <button>4</button>
            <button>5</button>
            <button>6</button>
            <button>=</button>

            <button>1</button>
            <button>2</button>
            <button>3</button>
            <button>0</button>

            <button onclick="deleteLast()">DEL</button>

        </div>
    </div>

    <script>
        const display = document.getElementById("display");
        const buttons = document.getElementById("buttons");

        let expression = localStorage.getItem("calc") || "";

        // Initialize display
        display.textContent = expression || "0";

        // Event Delegation (cleaner)
        buttons.addEventListener("click", (e) => {
            if (e.target.tagName !== "BUTTON") return;

            const value = e.target.textContent;

            handleInput(value);
        });

        function handleInput(value) {
            if (value === "C") {
                clearDisplay();
            } else if (value === "=") {
                calculate();
            } else {
                appendValue(value);
            }
        }

        function appendValue(val) {
            expression += val;
            updateDisplay();
        }

        function calculate() {
            try {
                expression = eval(expression).toString();
                saveData();
            } catch {
                expression = "Error";
            }
            updateDisplay();
        }

        function clearDisplay() {
            expression = "";
            updateDisplay();
            saveData();
        }

        function updateDisplay() {
            display.textContent = expression || "0";
        }

        function saveData() {
            localStorage.setItem("calc", expression);
        }

        function deleteLast() {
            let display = document.getElementById("display");
            display.value = display.value.slice(0, -1);
        }
    </script>

</body>

</html>
